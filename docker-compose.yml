version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: redflagui-app
    restart: always
    ports:
      - "${PORT:-8083}:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      API_BASE_URL: "${API_BASE_URL}"
      APP_URL: ${APP_URL}
      SESSION_DRIVER: file
      CACHE_DRIVER: file
    # Re-create storage structure AFTER volumes are mounted, then start Apache
    entrypoint: >
      /bin/sh -c "
        mkdir -p /var/www/html/storage/framework/views
                 /var/www/html/storage/framework/cache/data
                 /var/www/html/storage/framework/sessions
                 /var/www/html/storage/logs &&
        touch /var/www/html/storage/logs/laravel.log &&
        chown -R www-data:www-data /var/www/html/storage &&
        chmod -R 775 /var/www/html/storage &&
        apache2-foreground
      "
    volumes:
      - sqlite_data:/var/www/html/database
      - storage_data:/var/www/html/storage
    networks:
      - log_ad_network

volumes:
  sqlite_data:
  storage_data:

networks:
  log_ad_network:
    external: true
    name: log_ad_network
